<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>מתכנן טיולים</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@400;500;700;900&family=Assistant:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;700&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#1B2A2F;
    --ink-soft:#233B41;
    --paper:#F3ECDC;
    --paper-soft:#EBE2CB;
    --stay:#28423B;
    --stay-soft:#33544B;
    --brass:#C08A3E;
    --brass-soft:#E0B876;
    --rust:#B5502B;
    --pine:#4C7A68;
    --line:#D8CBA9;
    --line-dark:#3E5B58;
    --ink-text:#2A2118;
    --paper-text:#F3ECDC;
    --muted:#8B7F63;
    --radius:18px;
    font-size:16px;
  }
  *{box-sizing:border-box;}
  html,body{margin:0;padding:0;}
  body{
    background:
      radial-gradient(ellipse at 20% -10%, rgba(192,138,62,0.12), transparent 55%),
      radial-gradient(ellipse at 100% 0%, rgba(76,122,104,0.14), transparent 45%),
      var(--ink);
    color:var(--paper);
    font-family:'Assistant', sans-serif;
    min-height:100vh;
    padding:32px 16px 80px;
  }
  .wrap{max-width:840px;margin:0 auto;}
  .eyebrow{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.14em;
    color:var(--brass-soft);
    text-transform:uppercase;
    margin:0 0 10px;
  }

  /* ---------- Header ticket ---------- */
  .header-card{
    position:relative;
    background:var(--paper);
    color:var(--ink-text);
    border-radius:var(--radius);
    padding:30px 32px 26px;
    overflow:hidden;
    box-shadow:0 24px 50px -20px rgba(0,0,0,0.55);
  }
  .header-card::before{
    content:'';
    position:absolute; inset-inline-start:0; top:0; bottom:0;
    width:10px;
    background:repeating-linear-gradient(180deg, var(--brass) 0 10px, transparent 10px 20px);
    opacity:0.7;
  }
  .trip-title{
    font-family:'Frank Ruhl Libre', serif;
    font-weight:700;
    font-size:clamp(28px,5vw,42px);
    line-height:1.15;
    width:100%;
    border:none;
    background:transparent;
    color:var(--ink-text);
    outline:none;
    padding:2px 0;
  }
  .trip-title::placeholder{color:#B7A981;}
  .header-meta{
    display:flex;
    flex-wrap:wrap;
    gap:22px;
    margin-top:18px;
    padding-top:16px;
    border-top:1.5px dashed var(--line);
  }
  .meta-field{display:flex;flex-direction:column;gap:4px;}
  .meta-field label{
    font-family:'JetBrains Mono', monospace;
    font-size:11px;
    letter-spacing:0.08em;
    color:var(--muted);
    text-transform:uppercase;
  }
  .meta-field input{
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    border:none;
    background:transparent;
    color:var(--ink-text);
    outline:none;
    width:150px;
  }
  .stat{
    font-family:'JetBrains Mono', monospace;
    font-size:15px;
    color:var(--ink-text);
  }
  .stat b{color:var(--rust);font-weight:700;}

  /* ---------- Days ---------- */
  .days{display:flex;flex-direction:column;gap:34px;margin-top:36px;}

  .day-card{
    position:relative;
    background:var(--paper);
    border-radius:var(--radius);
    overflow:hidden;
    box-shadow:0 20px 40px -22px rgba(0,0,0,0.5);
  }
  .day-top{
    display:flex;
    align-items:flex-start;
    gap:16px;
    padding:24px 28px 18px;
  }
  .day-badge{
    flex:0 0 auto;
    width:46px;height:46px;
    border-radius:50%;
    background:var(--brass);
    color:var(--ink-text);
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:16px;
    display:flex;align-items:center;justify-content:center;
  }
  .day-heading{flex:1 1 auto;min-width:0;}
  .day-date{
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    color:var(--muted);
    letter-spacing:0.05em;
    margin-bottom:4px;
  }
  .day-dest{
    font-family:'Frank Ruhl Libre', serif;
    font-weight:600;
    font-size:22px;
    border:none;
    background:transparent;
    color:var(--ink-text);
    outline:none;
    width:100%;
    border-bottom:1.5px solid transparent;
    transition:border-color .15s;
  }
  .day-dest:focus{border-bottom-color:var(--brass);}
  .day-dest::placeholder{color:#B7A981;}
  .icon-btn{
    flex:0 0 auto;
    width:34px;height:34px;
    border-radius:10px;
    border:1.5px solid var(--line);
    background:transparent;
    color:var(--muted);
    display:flex;align-items:center;justify-content:center;
    cursor:pointer;
    transition:background .15s,color .15s,border-color .15s;
  }
  .icon-btn:hover{background:var(--rust);border-color:var(--rust);color:var(--paper);}
  .icon-btn svg{width:16px;height:16px;stroke:currentColor;fill:none;stroke-width:1.8;}

  .activities{padding:0 28px;display:flex;flex-direction:column;gap:10px;}
  .activity{
    border:1.5px solid var(--line);
    border-radius:12px;
    padding:12px 14px;
    display:grid;
    grid-template-columns:88px 1fr 34px;
    gap:8px 12px;
    align-items:start;
    background:rgba(255,255,255,0.25);
  }
  .activity input, .activity textarea{
    font-family:'Assistant', sans-serif;
    border:none;
    background:transparent;
    outline:none;
    color:var(--ink-text);
    width:100%;
  }
  .activity .time{
    grid-column:1;
    font-family:'JetBrains Mono', monospace;
    font-weight:700;
    font-size:14px;
    color:var(--rust);
    background:rgba(181,80,43,0.08);
    border-radius:8px;
    padding:6px 6px;
    text-align:center;
  }
  .activity .title{
    grid-column:2;
    font-size:16px;
    font-weight:600;
    padding:6px 2px;
  }
  .activity .del{grid-column:3;align-self:start;}
  .activity .details{
    grid-column:1/4;
    display:grid;
    grid-template-columns:repeat(3,1fr);
    gap:8px;
    border-top:1px dashed var(--line);
    padding-top:8px;
    margin-top:2px;
  }
  .field-icon{
    display:flex;align-items:center;gap:6px;
    font-size:13px;
    color:var(--ink-text);
    border-bottom:1px solid transparent;
  }
  .field-icon:focus-within{border-bottom-color:var(--brass);}
  .field-icon svg{width:14px;height:14px;stroke:var(--muted);fill:none;stroke-width:1.8;flex:0 0 auto;}
  .field-icon input{font-size:13px;padding:3px 0;}
  .details .notes{grid-column:1/4;}

  .add-activity{
    margin:4px 0 22px;
    align-self:flex-start;
    background:transparent;
    border:1.5px dashed var(--line);
    color:var(--pine);
    font-family:'Assistant', sans-serif;
    font-weight:600;
    font-size:14px;
    border-radius:10px;
    padding:9px 16px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:6px;
    margin-inline-start:28px;
  }
  .add-activity:hover{border-color:var(--pine);background:rgba(76,122,104,0.08);}
  .add-activity svg{width:14px;height:14px;stroke:currentColor;fill:none;stroke-width:2;}

  /* ---------- Ticket perforation ---------- */
  .perf{position:relative;height:0;border-top:2px dashed var(--line-dark);opacity:0.5;margin:0 0;}
  .perf::before,.perf::after{
    content:'';
    position:absolute;top:50%;
    width:26px;height:26px;
    border-radius:50%;
    background:var(--ink);
    transform:translateY(-50%);
  }
  .perf::before{inset-inline-end:-13px;}
  .perf::after{inset-inline-start:-13px;}

  /* ---------- Hotel stub ---------- */
  .hotel-stub{
    background:var(--stay);
    color:var(--paper-text);
    padding:20px 28px 24px;
    display:flex;
    flex-direction:column;
    gap:12px;
  }
  .hotel-label{
    display:flex;align-items:center;gap:8px;
    font-family:'JetBrains Mono', monospace;
    font-size:12px;
    letter-spacing:0.1em;
    text-transform:uppercase;
    color:var(--brass-soft);
  }
  .hotel-label svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.8;}
  .hotel-grid{
    display:grid;
    grid-template-columns:1.4fr 1fr 0.7fr;
    gap:10px 16px;
  }
  .hotel-grid .wide{grid-column:1/4;}
  .hotel-field{
    display:flex;flex-direction:column;gap:3px;
    border-bottom:1.5px solid var(--stay-soft);
    padding-bottom:6px;
  }
  .hotel-field label{
    font-family:'JetBrains Mono', monospace;
    font-size:10.5px;
    letter-spacing:0.08em;
    color:#9FC2B4;
    text-transform:uppercase;
  }
  .hotel-field input,.hotel-field textarea{
    background:transparent;
    border:none;
    outline:none;
    color:var(--paper-text);
    font-family:'Assistant', sans-serif;
    font-size:14.5px;
  }
  .hotel-field input::placeholder,.hotel-field textarea::placeholder{color:#7FA294;}

  /* ---------- Footer bar ---------- */
  .day-actions{display:flex;justify-content:flex-start;}
  .toolbar{
    display:flex;
    flex-wrap:wrap;
    gap:12px;
    justify-content:space-between;
    align-items:center;
    margin-top:38px;
  }
  .btn-row{display:flex;gap:10px;flex-wrap:wrap;}
  .btn{
    font-family:'Assistant', sans-serif;
    font-weight:600;
    font-size:14.5px;
    padding:11px 20px;
    border-radius:12px;
    cursor:pointer;
    display:inline-flex;
    align-items:center;
    gap:8px;
    border:1.5px solid transparent;
  }
  .btn svg{width:15px;height:15px;stroke:currentColor;fill:none;stroke-width:1.9;}
  .btn-primary{background:var(--brass);color:var(--ink-text);}
  .btn-primary:hover{background:var(--brass-soft);}
  .btn-ghost{background:transparent;color:var(--paper);border-color:var(--line-dark);}
  .btn-ghost:hover{border-color:var(--rust);color:var(--rust);}
  .autosave-note{
    font-family:'JetBrains Mono', monospace;
    font-size:11.5px;
    color:var(--muted);
    letter-spacing:0.03em;
  }

  @media (max-width:620px){
    .activity{grid-template-columns:70px 1fr 30px;}
    .details{grid-template-columns:1fr 1fr;}
    .hotel-grid{grid-template-columns:1fr 1fr;}
    .hotel-grid .wide{grid-column:1/3;}
  }
  @media (max-width:420px){
    .details{grid-template-columns:1fr;}
    .hotel-grid{grid-template-columns:1fr;}
    .hotel-grid .wide{grid-column:1;}
  }

  @media print{
    body{background:#fff;color:#000;padding:0;}
    .icon-btn,.add-activity,.toolbar,.autosave-note{display:none !important;}
    .header-card,.day-card{box-shadow:none;border:1px solid #ccc;break-inside:avoid;}
    .hotel-stub{background:#eee !important;color:#000 !important;}
    .perf::before,.perf::after{background:#fff;}
  }
</style>
</head>
<body>
<div class="wrap">

  <p class="eyebrow">מתכנן טיולים</p>

  <div class="header-card">
    <input class="trip-title" id="tripName" placeholder="לאן טסים?" />
    <div class="header-meta">
      <div class="meta-field">
        <label>תאריך יציאה</label>
        <input type="date" id="startDate">
      </div>
      <div class="meta-field">
        <label>ימים</label>
        <span class="stat" id="daysCount">0</span>
      </div>
      <div class="meta-field">
        <label>תקציב משוער</label>
        <span class="stat">₪<b id="budgetTotal">0</b></span>
      </div>
    </div>
  </div>

  <div class="days" id="days"></div>

  <div class="day-actions" style="margin-top:22px;">
    <button class="btn btn-primary" id="addDay">
      <svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>
      הוסף יום
    </button>
  </div>

  <div class="toolbar">
    <span class="autosave-note">השינויים נשמרים אוטומטית במכשיר שלך</span>
    <div class="btn-row">
      <button class="btn btn-ghost" id="printBtn">
        <svg viewBox="0 0 24 24"><path d="M6 9V3h12v6M6 18h12v3H6v-3ZM4 9h16v7H4V9Z" stroke-linecap="round" stroke-linejoin="round"/></svg>
        הדפסה / ייצוא
      </button>
      <button class="btn btn-ghost" id="clearAll">
        <svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0-1 13a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1L6 7" stroke-linecap="round" stroke-linejoin="round"/></svg>
        נקה הכל
      </button>
    </div>
  </div>
</div>

<script>
const ICONS = {
  time:  `<svg viewBox="0 0 24 24"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  place: `<svg viewBox="0 0 24 24"><path d="M12 21s7-6.2 7-11.5A7 7 0 0 0 5 9.5C5 14.8 12 21 12 21Z" stroke-linejoin="round"/><circle cx="12" cy="9.5" r="2.3"/></svg>`,
  transport: `<svg viewBox="0 0 24 24"><path d="M4 16V9a2 2 0 0 1 2-2h12a2 2 0 0 1 2 2v7" stroke-linecap="round" stroke-linejoin="round"/><rect x="4" y="9" width="16" height="8" rx="2"/><circle cx="8" cy="19" r="1.4"/><circle cx="16" cy="19" r="1.4"/></svg>`,
  cost:  `<svg viewBox="0 0 24 24"><path d="M12 3v18M8 7.5h6.5a2.5 2.5 0 0 1 0 5H9.5a2.5 2.5 0 0 0 0 5H17" stroke-linecap="round"/></svg>`,
  link:  `<svg viewBox="0 0 24 24"><path d="M9 15 15 9M10 6l1.4-1.4a4 4 0 1 1 5.6 5.6L15.6 11M14 18l-1.4 1.4a4 4 0 1 1-5.6-5.6L8.4 12.4" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  notes: `<svg viewBox="0 0 24 24"><path d="M5 4h14v16l-4-3-3 3-3-3-4 3V4Z" stroke-linejoin="round"/></svg>`,
  bed:   `<svg viewBox="0 0 24 24"><path d="M3 18v-8a2 2 0 0 1 2-2h6v5M3 18v2M3 18h18v2M13 13h6a2 2 0 0 1 2 2v3M7 10.5a1.5 1.5 0 1 0 0-3 1.5 1.5 0 0 0 0 3Z" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  trash: `<svg viewBox="0 0 24 24"><path d="M4 7h16M9 7V5a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2m2 0-1 13a1 1 0 0 1-1 1H8a1 1 0 0 1-1-1L6 7" stroke-linecap="round" stroke-linejoin="round"/></svg>`,
  plus:  `<svg viewBox="0 0 24 24"><path d="M12 5v14M5 12h14" stroke-linecap="round"/></svg>`,
};

const TRANSPORT_OPTIONS = ['הליכה','רכב שכור','תחבורה ציבורית','מונית / אפליקציית הסעה','רכבת','אופניים','טיסה','מעבורת'];

const STORAGE_KEY = 'triplan-data-v1';

let uid = 1;
function nextId(){ return 'id' + (uid++) + '-' + Date.now().toString(36); }

function loadState(){
  try{
    const raw = localStorage.getItem(STORAGE_KEY);
    if(raw) return JSON.parse(raw);
  }catch(e){}
  return { name:'', startDate:'', days:[ newDay() ] };
}

function saveState(){
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
}

let state = loadState();

function newDay(){
  return { id: nextId(), destination:'', activities:[ newActivity() ], hotel:{ name:'', link:'', cost:'', notes:'' } };
}
function newActivity(){
  return { id: nextId(), time:'', title:'', transport:'', cost:'', link:'', notes:'' };
}

const daysEl = document.getElementById('days');
const tripNameEl = document.getElementById('tripName');
const startDateEl = document.getElementById('startDate');

function formatDate(dateStr, offset){
  if(!dateStr) return null;
  const d = new Date(dateStr + 'T00:00:00');
  if(isNaN(d)) return null;
  d.setDate(d.getDate() + offset);
  return d.toLocaleDateString('he-IL', { weekday:'short', day:'numeric', month:'short' });
}

function render(){
  tripNameEl.value = state.name;
  startDateEl.value = state.startDate;
  daysEl.innerHTML = '';

  state.days.forEach((day, index) => {
    const card = document.createElement('div');
    card.className = 'day-card';

    const dateLabel = formatDate(state.startDate, index);

    card.innerHTML = `
      <div class="day-top">
        <div class="day-badge">${index+1}</div>
        <div class="day-heading">
          <div class="day-date">${dateLabel ? dateLabel : 'יום ' + (index+1)}</div>
          <input class="day-dest" data-role="destination" placeholder="לאן הולכים היום?" value="${escapeAttr(day.destination)}">
        </div>
        <button class="icon-btn" data-role="del-day" title="מחק יום">${ICONS.trash}</button>
      </div>
      <div class="activities" data-role="activities"></div>
      <button class="add-activity" data-role="add-activity">${ICONS.plus} הוסף פעילות</button>
      <div class="perf"></div>
      <div class="hotel-stub">
        <div class="hotel-label">${ICONS.bed} לינה בלילה שאחרי</div>
        <div class="hotel-grid">
          <div class="hotel-field">
            <label>בית מלון</label>
            <input data-role="hotel-name" placeholder="שם המלון" value="${escapeAttr(day.hotel.name)}">
          </div>
          <div class="hotel-field">
            <label>קישור / כתובת</label>
            <input data-role="hotel-link" placeholder="מפה / אתר" value="${escapeAttr(day.hotel.link)}">
          </div>
          <div class="hotel-field">
            <label>עלות ללילה</label>
            <input data-role="hotel-cost" type="number" min="0" placeholder="₪" value="${escapeAttr(day.hotel.cost)}">
          </div>
          <div class="hotel-field wide">
            <label>הערות</label>
            <input data-role="hotel-notes" placeholder="הערות ללינה" value="${escapeAttr(day.hotel.notes)}">
          </div>
        </div>
      </div>
    `;

    const actsEl = card.querySelector('[data-role="activities"]');
    day.activities.forEach(act => actsEl.appendChild(buildActivityRow(day, act)));

    card.querySelector('[data-role="destination"]').addEventListener('input', e => {
      day.destination = e.target.value; saveState(); updateStats();
    });
    card.querySelector('[data-role="del-day"]').addEventListener('click', () => {
      if(state.days.length <= 1){
        if(!confirm('זהו היום היחיד בטיול. למחוק בכל זאת ולהתחיל מחדש?')) return;
      } else if(!confirm('למחוק את היום הזה?')){ return; }
      state.days.splice(index,1);
      if(state.days.length === 0) state.days.push(newDay());
      saveState(); render();
    });
    card.querySelector('[data-role="add-activity"]').addEventListener('click', () => {
      const act = newActivity();
      day.activities.push(act);
      actsEl.appendChild(buildActivityRow(day, act));
      saveState();
    });

    const hn = card.querySelector('[data-role="hotel-name"]');
    const hl = card.querySelector('[data-role="hotel-link"]');
    const hc = card.querySelector('[data-role="hotel-cost"]');
    const hnotes = card.querySelector('[data-role="hotel-notes"]');
    hn.addEventListener('input', e => { day.hotel.name = e.target.value; saveState(); });
    hl.addEventListener('input', e => { day.hotel.link = e.target.value; saveState(); });
    hc.addEventListener('input', e => { day.hotel.cost = e.target.value; saveState(); updateStats(); });
    hnotes.addEventListener('input', e => { day.hotel.notes = e.target.value; saveState(); });

    daysEl.appendChild(card);
  });

  updateStats();
}

function buildActivityRow(day, act){
  const row = document.createElement('div');
  row.className = 'activity';
  const dlId = 'transport-list-' + act.id;
  row.innerHTML = `
    <input class="time" data-role="time" type="time" value="${escapeAttr(act.time)}">
    <input class="title" data-role="title" placeholder="פעילות / יעד" value="${escapeAttr(act.title)}">
    <button class="icon-btn del" data-role="del-activity" title="מחק פעילות">${ICONS.trash}</button>
    <div class="details">
      <label class="field-icon">${ICONS.transport}<input data-role="transport" list="${dlId}" placeholder="תחבורה" value="${escapeAttr(act.transport)}"></label>
      <label class="field-icon">${ICONS.cost}<input data-role="cost" type="number" min="0" placeholder="עלות ₪" value="${escapeAttr(act.cost)}"></label>
      <label class="field-icon">${ICONS.link}<input data-role="link" placeholder="קישור / כתובת" value="${escapeAttr(act.link)}"></label>
      <label class="field-icon notes">${ICONS.notes}<input data-role="notes" placeholder="הערות" value="${escapeAttr(act.notes)}"></label>
      <datalist id="${dlId}">${TRANSPORT_OPTIONS.map(o=>`<option value="${o}">`).join('')}</datalist>
    </div>
  `;

  row.querySelector('[data-role="time"]').addEventListener('input', e => { act.time = e.target.value; saveState(); });
  row.querySelector('[data-role="title"]').addEventListener('input', e => { act.title = e.target.value; saveState(); });
  row.querySelector('[data-role="transport"]').addEventListener('input', e => { act.transport = e.target.value; saveState(); });
  row.querySelector('[data-role="cost"]').addEventListener('input', e => { act.cost = e.target.value; saveState(); updateStats(); });
  row.querySelector('[data-role="link"]').addEventListener('input', e => { act.link = e.target.value; saveState(); });
  row.querySelector('[data-role="notes"]').addEventListener('input', e => { act.notes = e.target.value; saveState(); });
  row.querySelector('[data-role="del-activity"]').addEventListener('click', () => {
    const idx = day.activities.indexOf(act);
    if(idx > -1) day.activities.splice(idx,1);
    row.remove();
    saveState(); updateStats();
  });

  return row;
}

function updateStats(){
  document.getElementById('daysCount').textContent = state.days.length;
  let total = 0;
  state.days.forEach(day => {
    day.activities.forEach(a => { total += Number(a.cost) || 0; });
    total += Number(day.hotel.cost) || 0;
  });
  document.getElementById('budgetTotal').textContent = total.toLocaleString('he-IL');
}

function escapeAttr(str){
  return String(str ?? '').replace(/&/g,'&amp;').replace(/"/g,'&quot;').replace(/</g,'&lt;');
}

tripNameEl.addEventListener('input', e => { state.name = e.target.value; saveState(); });
startDateEl.addEventListener('input', e => { state.startDate = e.target.value; saveState(); render(); });

document.getElementById('addDay').addEventListener('click', () => {
  state.days.push(newDay());
  saveState(); render();
});
document.getElementById('printBtn').addEventListener('click', () => window.print());
document.getElementById('clearAll').addEventListener('click', () => {
  if(!confirm('לנקות את כל התכנון? הפעולה לא הפיכה.')) return;
  state = { name:'', startDate:'', days:[ newDay() ] };
  saveState(); render();
});

render();
</script>
</body>
</html>
